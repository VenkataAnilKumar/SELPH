<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">

<defs>
  <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#14142a"/>
    <stop offset="100%" stop-color="#0d0d1e"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1200" height="300" fill="#080812" rx="14"/>

<!-- ═══════════════════════════════════════════════════
     CARD 1 · Maya Chen · Content Creator · #f97316
     x=20, avatar center=(126, 96)
     ═══════════════════════════════════════════════════ -->
<rect x="20" y="20" width="212" height="260" rx="10" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<rect x="20" y="20" width="212" height="4"   rx="2"  fill="#f97316"/>
<!-- Avatar glow + circle -->
<circle cx="126" cy="96" r="46" fill="#f97316" opacity="0.10"/>
<circle cx="126" cy="96" r="36" fill="#f97316" opacity="0.88"/>
<!-- Initial -->
<text x="126" y="96" text-anchor="middle" dominant-baseline="middle"
      font-size="28" font-weight="700" fill="white">M</text>
<!-- Name -->
<text x="126" y="148" text-anchor="middle" dominant-baseline="middle"
      font-size="13" font-weight="600" fill="white" letter-spacing="0.2">Maya Chen</text>
<!-- Role pill -->
<rect x="66" y="160" width="120" height="18" rx="9" fill="rgba(249,115,22,0.14)" stroke="rgba(249,115,22,0.28)" stroke-width="1"/>
<text x="126" y="169" text-anchor="middle" dominant-baseline="middle"
      font-size="9" fill="#f97316" letter-spacing="0.6">Content Creator</text>
<!-- Divider -->
<line x1="40" y1="187" x2="212" y2="187" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<!-- Pain quote -->
<text x="126" y="203" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">"Can't reply to 50K DMs.</text>
<text x="126" y="218" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">Fans feel ignored."</text>
<!-- Stat -->
<text x="126" y="252" text-anchor="middle" dominant-baseline="middle"
      font-size="22" font-weight="700" fill="#f97316">2.1M</text>
<text x="126" y="270" text-anchor="middle" dominant-baseline="middle"
      font-size="8.5" fill="rgba(255,255,255,0.30)" letter-spacing="1">FOLLOWERS</text>

<!-- ═══════════════════════════════════════════════════
     CARD 2 · Raj Patel · Consultant · #6366f1
     x=257, avatar center=(363, 96)
     ═══════════════════════════════════════════════════ -->
<rect x="257" y="20" width="212" height="260" rx="10" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<rect x="257" y="20" width="212" height="4"   rx="2"  fill="#6366f1"/>
<circle cx="363" cy="96" r="46" fill="#6366f1" opacity="0.10"/>
<circle cx="363" cy="96" r="36" fill="#6366f1" opacity="0.88"/>
<text x="363" y="96" text-anchor="middle" dominant-baseline="middle"
      font-size="28" font-weight="700" fill="white">R</text>
<text x="363" y="148" text-anchor="middle" dominant-baseline="middle"
      font-size="13" font-weight="600" fill="white" letter-spacing="0.2">Raj Patel</text>
<rect x="303" y="160" width="120" height="18" rx="9" fill="rgba(99,102,241,0.14)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
<text x="363" y="169" text-anchor="middle" dominant-baseline="middle"
      font-size="9" fill="#6366f1" letter-spacing="0.6">Strategy Consultant</text>
<line x1="277" y1="187" x2="449" y2="187" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="363" y="203" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">"Every delayed reply</text>
<text x="363" y="218" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">costs me a client."</text>
<text x="363" y="252" text-anchor="middle" dominant-baseline="middle"
      font-size="22" font-weight="700" fill="#6366f1">$420K</text>
<text x="363" y="270" text-anchor="middle" dominant-baseline="middle"
      font-size="8.5" fill="rgba(255,255,255,0.30)" letter-spacing="1">ACTIVE PIPELINE</text>

<!-- ═══════════════════════════════════════════════════
     CARD 3 · Alex Kim · Developer · #22c55e
     x=494, avatar center=(600, 96)
     ═══════════════════════════════════════════════════ -->
<rect x="494" y="20" width="212" height="260" rx="10" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<rect x="494" y="20" width="212" height="4"   rx="2"  fill="#22c55e"/>
<circle cx="600" cy="96" r="46" fill="#22c55e" opacity="0.10"/>
<circle cx="600" cy="96" r="36" fill="#22c55e" opacity="0.88"/>
<text x="600" y="96" text-anchor="middle" dominant-baseline="middle"
      font-size="28" font-weight="700" fill="white">A</text>
<text x="600" y="148" text-anchor="middle" dominant-baseline="middle"
      font-size="13" font-weight="600" fill="white" letter-spacing="0.2">Alex Kim</text>
<rect x="540" y="160" width="120" height="18" rx="9" fill="rgba(34,197,94,0.14)" stroke="rgba(34,197,94,0.28)" stroke-width="1"/>
<text x="600" y="169" text-anchor="middle" dominant-baseline="middle"
      font-size="9" fill="#22c55e" letter-spacing="0.6">Senior Engineer</text>
<line x1="514" y1="187" x2="686" y2="187" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="600" y="203" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">"GitHub never sleeps.</text>
<text x="600" y="218" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">Neither do the issues."</text>
<text x="600" y="252" text-anchor="middle" dominant-baseline="middle"
      font-size="22" font-weight="700" fill="#22c55e">340</text>
<text x="600" y="270" text-anchor="middle" dominant-baseline="middle"
      font-size="8.5" fill="rgba(255,255,255,0.30)" letter-spacing="1">OPEN ISSUES</text>

<!-- ═══════════════════════════════════════════════════
     CARD 4 · Sarah Mitchell · Executive · #a855f7
     x=731, avatar center=(837, 96)
     ═══════════════════════════════════════════════════ -->
<rect x="731" y="20" width="212" height="260" rx="10" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<rect x="731" y="20" width="212" height="4"   rx="2"  fill="#a855f7"/>
<circle cx="837" cy="96" r="46" fill="#a855f7" opacity="0.10"/>
<circle cx="837" cy="96" r="36" fill="#a855f7" opacity="0.88"/>
<text x="837" y="96" text-anchor="middle" dominant-baseline="middle"
      font-size="28" font-weight="700" fill="white">S</text>
<text x="837" y="148" text-anchor="middle" dominant-baseline="middle"
      font-size="13" font-weight="600" fill="white" letter-spacing="0.2">Sarah Mitchell</text>
<rect x="777" y="160" width="120" height="18" rx="9" fill="rgba(168,85,247,0.14)" stroke="rgba(168,85,247,0.28)" stroke-width="1"/>
<text x="837" y="169" text-anchor="middle" dominant-baseline="middle"
      font-size="9" fill="#a855f7" letter-spacing="0.6">CMO · Executive</text>
<line x1="751" y1="187" x2="923" y2="187" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="837" y="203" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">"300 emails a day.</text>
<text x="837" y="218" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">Zero time to think."</text>
<text x="837" y="252" text-anchor="middle" dominant-baseline="middle"
      font-size="22" font-weight="700" fill="#a855f7">300</text>
<text x="837" y="270" text-anchor="middle" dominant-baseline="middle"
      font-size="8.5" fill="rgba(255,255,255,0.30)" letter-spacing="1">EMAILS PER DAY</text>

<!-- ═══════════════════════════════════════════════════
     CARD 5 · Jamie · Everyone · #ec4899
     x=968, avatar center=(1074, 96)
     ═══════════════════════════════════════════════════ -->
<rect x="968" y="20" width="212" height="260" rx="10" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<rect x="968" y="20" width="212" height="4"   rx="2"  fill="#ec4899"/>
<circle cx="1074" cy="96" r="46" fill="#ec4899" opacity="0.10"/>
<circle cx="1074" cy="96" r="36" fill="#ec4899" opacity="0.88"/>
<text x="1074" y="96" text-anchor="middle" dominant-baseline="middle"
      font-size="28" font-weight="700" fill="white">J</text>
<text x="1074" y="148" text-anchor="middle" dominant-baseline="middle"
      font-size="13" font-weight="600" fill="white" letter-spacing="0.2">Jamie</text>
<rect x="1014" y="160" width="120" height="18" rx="9" fill="rgba(236,72,153,0.14)" stroke="rgba(236,72,153,0.28)" stroke-width="1"/>
<text x="1074" y="169" text-anchor="middle" dominant-baseline="middle"
      font-size="9" fill="#ec4899" letter-spacing="0.6">Everyone</text>
<line x1="988" y1="187" x2="1160" y2="187" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="1074" y="203" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">"I wish I could be</text>
<text x="1074" y="218" text-anchor="middle" dominant-baseline="middle"
      font-size="10.5" fill="rgba(255,255,255,0.52)" font-style="italic">in two places at once."</text>
<text x="1074" y="252" text-anchor="middle" dominant-baseline="middle"
      font-size="22" font-weight="700" fill="#ec4899">24h</text>
<text x="1074" y="270" text-anchor="middle" dominant-baseline="middle"
      font-size="8.5" fill="rgba(255,255,255,0.30)" letter-spacing="1">NEVER ENOUGH</text>

</svg>
