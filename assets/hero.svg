<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">

<defs>
  <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
    <stop offset="0%" stop-color="#1c1050"/>
    <stop offset="50%" stop-color="#0c0820"/>
    <stop offset="100%" stop-color="#05050f"/>
  </radialGradient>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#818cf8"/>
    <stop offset="50%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#c084fc"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1200" height="340" fill="url(#bgGrad)"/>

<!-- Center glow (layered circles — no filter needed) -->
<circle cx="600" cy="150" r="320" fill="#4f46e5" opacity="0.03"/>
<circle cx="600" cy="150" r="220" fill="#4f46e5" opacity="0.05"/>
<circle cx="600" cy="150" r="130" fill="#6366f1" opacity="0.07"/>
<circle cx="600" cy="150" r="65"  fill="#818cf8" opacity="0.07"/>

<!-- Left purple glow -->
<circle cx="210" cy="110" r="170" fill="#7c3aed" opacity="0.05"/>
<circle cx="210" cy="110" r="90"  fill="#9333ea" opacity="0.06"/>

<!-- Right blue glow -->
<circle cx="990" cy="230" r="170" fill="#2563eb" opacity="0.05"/>
<circle cx="990" cy="230" r="90"  fill="#3b82f6" opacity="0.06"/>

<!-- Corner brackets -->
<polyline points="38,38 38,74 74,74"    fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.45" stroke-linejoin="round"/>
<polyline points="1162,38 1162,74 1126,74" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.45" stroke-linejoin="round"/>
<polyline points="38,302 38,266 74,266"  fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.45" stroke-linejoin="round"/>
<polyline points="1162,302 1162,266 1126,266" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.45" stroke-linejoin="round"/>

<!-- Top center dot accent -->
<circle cx="600" cy="34" r="2" fill="#6366f1" opacity="0.5"/>
<circle cx="600" cy="306" r="2" fill="#6366f1" opacity="0.5"/>

<!-- SELPH title — gradient fill -->
<text x="600" y="160" text-anchor="middle" dominant-baseline="middle"
      font-size="104" font-weight="900" letter-spacing="-4" fill="url(#titleGrad)">SELPH</text>

<!-- Accent line under title -->
<rect x="508" y="182" width="184" height="1.5" rx="1" fill="#6366f1" opacity="0.65"/>

<!-- Primary tagline -->
<text x="600" y="212" text-anchor="middle" dominant-baseline="middle"
      font-size="15" letter-spacing="6" fill="rgba(255,255,255,0.58)" font-weight="300">YOUR DIGITAL SELF</text>

<!-- Descriptor line -->
<text x="600" y="242" text-anchor="middle" dominant-baseline="middle"
      font-size="13" fill="rgba(255,255,255,0.30)" letter-spacing="0.3">The AI that doesn't just help you — it becomes you.</text>

<!-- Tech pills -->
<rect x="369" y="278" width="76" height="22" rx="11" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
<text x="407" y="291" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(255,255,255,0.42)" letter-spacing="0.7">FastAPI</text>

<rect x="455" y="278" width="84" height="22" rx="11" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
<text x="497" y="291" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(255,255,255,0.42)" letter-spacing="0.7">LangGraph</text>

<rect x="549" y="278" width="76" height="22" rx="11" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
<text x="587" y="291" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(255,255,255,0.42)" letter-spacing="0.7">pgvector</text>

<rect x="635" y="278" width="84" height="22" rx="11" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
<text x="677" y="291" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(255,255,255,0.42)" letter-spacing="0.7">140+ LLMs</text>

<rect x="729" y="278" width="102" height="22" rx="11" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
<text x="780" y="291" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="rgba(255,255,255,0.42)" letter-spacing="0.7">React Native</text>

</svg>
