[pytest]
# Pytest configuration for SELPH backend tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Test paths
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests for services and utilities
    integration: Integration tests for API endpoints
    acceptance: Acceptance tests for user flows
    slow: Slow running tests
    auth: Authentication tests
    message: Message handling tests
    draft: Draft generation and approval tests
    twin: Twin configuration tests

# Coverage options
[coverage:run]
source = app
omit = 
    */migrations/*
    */tests/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
