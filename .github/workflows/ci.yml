name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run web tests
        run: npm test --workspace=src/web -- --runInBand --ci

  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mobile tests
        run: npm test --workspace=src/mobile -- --runInBand --ci
