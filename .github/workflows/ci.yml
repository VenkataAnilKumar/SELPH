name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: src/backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: src/backend
        run: pytest tests/ -v --tb=short

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run web tests
        run: npm test --workspace=src/web -- --runInBand --ci

  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mobile tests
        run: npm test --workspace=src/mobile -- --runInBand --ci

  migration-smoke:
    name: Migration Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: selph
          POSTGRES_PASSWORD: selph_dev_password
          POSTGRES_DB: selph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U selph -d selph"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: src/backend
        run: pip install -r requirements.txt

      - name: Run migration + Phase 10 smoke
        working-directory: .
        env:
          DATABASE_URL: postgresql://selph:selph_dev_password@127.0.0.1:5432/selph
          ENVIRONMENT: development
        run: npm run smoke:backend:migrate
